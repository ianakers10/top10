const getApiKey = () => {
  try { return sessionStorage.getItem("anthropic_api_key") || ""; } catch (e) { return ""; }
};
const setApiKey = (k) => {
  try { if (k) sessionStorage.setItem("anthropic_api_key", k); else sessionStorage.removeItem("anthropic_api_key"); } catch (e) {}
};

const callClaude = async (prompt, systemPrompt) => {
  const key = getApiKey();
  if (!key) throw new Error("NO_API_KEY");
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-5",
      max_tokens: 2500,
      system: systemPrompt,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error("API error: " + resp.status + " " + errText.slice(0, 200));
  }
  const data = await resp.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  const cleaned = text.replace(/```json\s*/g, "").replace(/```\s*$/g, "").trim();
  return JSON.parse(cleaned);
};

const generateListTitles = async (categoryOrQuery) => {
  const sys = `You generate trivia "Top 10" list titles for a party game. Each list MUST be a definitive, verifiable ranking — backed by real data (records, statistics, box office, awards, measurements, etc.). Avoid subjective lists. Avoid lists that change weekly. Return ONLY valid JSON, no preamble, no markdown.`;
  const prompt = `Generate 5 trivia list titles for this category or query: "${categoryOrQuery}"

Each title must be:
- Specific and measurable (e.g. "Top 10 highest-grossing films of all time, unadjusted")
- Have a clear, verifiable answer set
- Fun to guess at a party

Return JSON in this exact shape:
{"titles": ["title 1", "title 2", "title 3", "title 4", "title 5"]}`;
  return callClaude(prompt, sys);
};

const generateList = async (title) => {
  const sys = `You generate trivia "Top 10" lists for a party game. Every answer must be FACTUALLY ACCURATE and verifiable. Return ONLY valid JSON, no preamble, no markdown.`;
  const prompt = `Generate the full top 10 list for: "${title}"

CRITICAL — DISTINCTNESS RULE:
Each of the 10 entries must represent a meaningfully DIFFERENT thing. Avoid filling the list with near-duplicates or sub-variants of the same underlying entity.

Examples of what to AVOID:
- "Largest mammals by weight" listing African bush elephant (#1), Asian elephant (#2), African forest elephant (#3) — these are all elephants. Collapse them to a single "Elephant" entry (use the largest representative for the data point) and use the remaining slots for distinct animals like rhino, hippo, giraffe, walrus, etc.
- "Highest-grossing films" listing Avatar (#1) and Avatar: The Way of Water (#3) as separate entries when the list is meant to showcase variety — only do this if the list's title explicitly invites it (e.g. "highest-grossing films" objectively does allow this, but "highest-grossing franchises" would not).
- "Best-selling artists" listing The Beatles (#1) and then individual Beatles members as separate entries.
- "Tallest mountains" listing multiple peaks of the same massif as separate entries.

How to apply the rule:
1. Identify the underlying CATEGORY each candidate belongs to (genus, franchise, artist, family, brand, etc.).
2. Within a single list, each category should appear at most ONCE — represented by its strongest/highest-ranked example.
3. EXCEPTION: if the list's title is specifically about ranking sub-variants (e.g. "Top 10 Marvel movies", "Top 10 Taylor Swift songs", "Top 10 elephant species by weight"), then sub-variants ARE the point and should be included.
4. Use your judgment: the goal is a list that feels varied and fun to guess, not a list where the team gets one answer and trivially deduces the next three.

Return JSON in this exact shape:
{
  "title": "${title}",
  "intro": "the full host introduction to read aloud — start with the standard rules-explanation framing, then end with a single cheeky one-liner relevant to this specific category. ~2-3 sentences total. The joke should be playful, not corny, and should feel like a witty friend wrote it. Avoid puns that require knowing the answers in advance.",
  "items": [
    {
      "rank": 1,
      "answer": "the canonical answer",
      "alternates": ["acceptable alternate phrasing"],
      "context": "1-2 sentence factual detail with the specific data point that justifies the ranking",
      "hint": "a short clue the host can read if guessers are stuck",
      "source": "the authoritative source"
    }
  ]
}

All 10 ranks required. Be accurate. Apply the distinctness rule.`;
  return callClaude(prompt, sys);
};

const useSound = (enabled) => {
  const ctxRef = useRef(null);
  const getCtx = () => {
    if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctxRef.current;
  };
  const tone = (freq, dur, type = "sine", gain = 0.15) => {
    if (!enabled) return;
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.value = gain;
      osc.connect(g); g.connect(ctx.destination);
      osc.start();
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
      osc.stop(ctx.currentTime + dur);
    } catch (e) {}
  };
  return {
    correct: () => { tone(660, 0.12, "triangle"); setTimeout(() => tone(990, 0.18, "triangle"), 90); },
    strike: () => tone(180, 0.25, "sawtooth", 0.12),
    victory: () => {
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, "triangle"), i * 110));
    },
  };
};

const GameBoard = ({ list, onNewList, sound, maxStrikes }) => {
  const audio = useSound(sound);
  const [correct, setCorrect] = useState({});
  const [expanded, setExpanded] = useState({});
  const [revealedHint, setRevealedHint] = useState({});
  const [strikes, setStrikes] = useState(0);
  const [showVictory, setShowVictory] = useState(false);
  const [showBust, setShowBust] = useState(false);

  const numCorrect = Object.values(correct).filter(Boolean).length;
  const allDone = numCorrect === 10;
  const bust = strikes >= maxStrikes;

  useEffect(() => {
    if (allDone && !showVictory) { setShowVictory(true); audio.victory(); }
  }, [allDone]);

  useEffect(() => {
    if (bust && !showBust && !allDone) setShowBust(true);
  }, [bust]);

  const toggleCorrect = (rank) => {
    setCorrect(prev => {
      const next = { ...prev };
      if (next[rank]) {
        delete next[rank];           // deselect — let the host fix accidental taps
      } else {
        next[rank] = true;
        audio.correct();             // only chime on a fresh correct
      }
      return next;
    });
  };
  const addStrike = () => {
    if (bust || allDone) return;
    setStrikes(s => s + 1);
    audio.strike();
  };

  const medalColor = (rank) => {
    if (rank === 1) return "#C9A227";
    if (rank === 2) return "#9A9A9A";
    if (rank === 3) return "#A66B3C";
    return INK;
  };

  return (
    <div className="max-w-xl mx-auto px-6 pt-6 pb-32 relative">
      <div className="flex items-center justify-between mb-2 pb-3 border-b rule">
        <button onClick={() => onNewList(numCorrect)} className="text-xs uppercase tracking-[0.2em] opacity-60 hover:opacity-100 flex items-center gap-1">
          <Icon name="chevleft" size={14}/> Exit
        </button>
        <div className="text-[10px] uppercase tracking-[0.22em] opacity-50">Host view</div>
      </div>

      <div className="py-6">
        <div className="text-[11px] uppercase tracking-[0.2em] opacity-50 mb-2">Top 10</div>
        <h2 className="serif text-2xl font-bold leading-[1.05] tracking-tight mb-6">{list.title}</h2>

        <div className="flex items-center justify-between gap-6 pb-4 border-b rule">
          <div>
            <div className="text-[10px] uppercase tracking-[0.2em] opacity-50">Correct</div>
            <div className="num text-3xl font-bold">{numCorrect}<span className="opacity-30">/10</span></div>
          </div>
          <div className="flex-1">
            <div className="text-[10px] uppercase tracking-[0.2em] opacity-50 mb-1">Strikes</div>
            <div className="flex gap-1.5 items-center flex-wrap">
              {Array.from({ length: maxStrikes === Infinity ? Math.max(3, strikes) : maxStrikes }).map((_, i) => (
                <div key={i} className="w-5 h-5 border-2 flex items-center justify-center" style={{ borderColor: i < strikes ? ACCENT : RULE, background: i < strikes ? ACCENT : "transparent" }}>
                  {i < strikes && <Icon name="x" size={12} style={{ color: CREAM, strokeWidth: 3 }}/>}
                </div>
              ))}
              <button onClick={addStrike} className="ml-2 text-[10px] uppercase tracking-[0.18em] font-semibold px-2 py-1 border-2" style={{ borderColor: ACCENT, color: ACCENT }}>+ Strike</button>
            </div>
          </div>
        </div>
      </div>

      <div className="space-y-1.5">
        {list.items.map((item, idx) => {
          const isCorrect = !!correct[item.rank];
          const isExpanded = !!expanded[item.rank];
          const isTop3 = item.rank <= 3;
          return (
            <motion.div key={item.rank} initial={{ opacity: 0, y: 6 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: idx * 0.03 }} className="border rule" style={{ background: isCorrect ? "#E8EFE3" : PAPER, borderColor: isCorrect ? CORRECT : RULE }}>
              <div className="flex items-center gap-3 p-3">
                <div className="w-10 flex-shrink-0 text-center">
                  <span className="num text-2xl font-bold" style={{ color: isCorrect ? CORRECT : (isTop3 ? medalColor(item.rank) : INK) }}>{item.rank}</span>
                </div>
                <div className="flex-1 min-w-0">
                  <motion.div
                    key={isCorrect ? "correct-" + item.rank : "pending-" + item.rank}
                    initial={isCorrect ? { scale: 0.85 } : { scale: 1 }}
                    animate={{ scale: 1 }}
                    transition={{ type: "spring", stiffness: 400, damping: 18 }}
                    className="serif text-lg leading-tight"
                    style={{
                      opacity: isCorrect ? 1 : 0.45,
                      fontStyle: isCorrect ? "normal" : "italic",
                      fontWeight: isCorrect ? 600 : 500,
                    }}
                  >
                    {item.answer}
                  </motion.div>
                  {isCorrect && isTop3 && (
                    <div className="text-[10px] uppercase tracking-[0.2em] mt-0.5" style={{ color: medalColor(item.rank) }}>
                      {item.rank === 1 ? "★ Gold" : item.rank === 2 ? "★ Silver" : "★ Bronze"}
                    </div>
                  )}
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <button onClick={() => setExpanded({ ...expanded, [item.rank]: !isExpanded })} className="p-2 opacity-60 hover:opacity-100" aria-label="show context">
                    <Icon name="chevdown" size={16} style={{ transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform .2s" }}/>
                  </button>
                  <button onClick={() => toggleCorrect(item.rank)} className="w-9 h-9 border-2 flex items-center justify-center transition" style={{ borderColor: isCorrect ? CORRECT : INK, background: isCorrect ? CORRECT : "transparent", borderRadius: "50%" }} aria-label={isCorrect ? "unmark correct" : "mark correct"} title={isCorrect ? "Tap to unmark" : "Mark correct"}>
                    {isCorrect && <Icon name="check" size={16} style={{ color: CREAM, strokeWidth: 3 }}/>}
                  </button>
                </div>
              </div>

              <AnimatePresence>
                {isExpanded && (
                  <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: "auto", opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden">
                    <div className="px-4 pb-4 pt-1 border-t rule" style={{ background: isCorrect ? "transparent" : "#FFFEF8" }}>
                      <div className="text-[10px] uppercase tracking-[0.2em] opacity-50 mb-1">Context</div>
                      <p className="text-sm leading-snug mb-3">{item.context}</p>
                      {item.alternates && item.alternates.length > 0 && (
                        <>
                          <div className="text-[10px] uppercase tracking-[0.2em] opacity-50 mb-1">Also accept</div>
                          <p className="text-sm leading-snug mb-3 italic opacity-80">{item.alternates.join(" · ")}</p>
                        </>
                      )}
                      <div className="flex items-center justify-between flex-wrap gap-2 pt-2 border-t rule">
                        <div className="text-[10px] uppercase tracking-[0.18em] opacity-50">Source: {item.source}</div>
                        <button onClick={() => setRevealedHint({ ...revealedHint, [item.rank]: !revealedHint[item.rank] })} className="text-[11px] uppercase tracking-[0.18em] font-semibold flex items-center gap-1 px-2 py-1 border" style={{ color: ACCENT, borderColor: ACCENT }}>
                          <Icon name="lightbulb" size={11}/> {revealedHint[item.rank] ? "Hide hint" : "Hint"}
                        </button>
                      </div>
                      {revealedHint[item.rank] && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="mt-3 p-3 italic serif text-sm" style={{ background: "#FFF7E8", borderLeft: "3px solid " + ACCENT }}>
                          {item.hint}
                        </motion.div>
                      )}
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>
            </motion.div>
          );
        })}
      </div>

      <AnimatePresence>
        {showVictory && (
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 flex items-center justify-center p-6 z-50" style={{ background: "rgba(26,26,26,0.85)" }}>
            <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} className="max-w-sm w-full p-8 text-center" style={{ background: CREAM }}>
              <div className="flex justify-center mb-4"><Icon name="trophy" size={40} style={{ color: ACCENT }}/></div>
              <div className="text-[10px] uppercase tracking-[0.25em] opacity-60 mb-2">A clean sweep</div>
              <h3 className="serif text-3xl font-bold mb-3 leading-tight">All ten.</h3>
              <p className="serif italic opacity-70 mb-6">{strikes} {strikes === 1 ? "strike" : "strikes"} along the way.</p>
              <button onClick={() => onNewList(numCorrect)} className="w-full py-3 serif font-bold" style={{ background: INK, color: CREAM }}>
                Choose a new list →
              </button>
            </motion.div>
          </motion.div>
        )}
        {showBust && !allDone && (
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="fixed inset-0 flex items-center justify-center p-6 z-50" style={{ background: "rgba(26,26,26,0.85)" }}>
            <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} className="max-w-sm w-full p-8 text-center" style={{ background: CREAM }}>
              <div className="flex justify-center mb-4"><Icon name="x" size={40} style={{ color: ACCENT }}/></div>
              <div className="text-[10px] uppercase tracking-[0.25em] opacity-60 mb-2">Out of strikes</div>
              <h3 className="serif text-3xl font-bold mb-3 leading-tight">{numCorrect} of 10.</h3>
              <p className="serif italic opacity-70 mb-6">Reveal the rest, or move on.</p>
              <div className="space-y-2">
                <button onClick={() => { const all = {}; list.items.forEach(it => all[it.rank] = true); setCorrect(all); setShowBust(false); }} className="w-full py-3 serif font-semibold border-2" style={{ borderColor: INK, color: INK }}>
                  Reveal the rest
                </button>
                <button onClick={() => onNewList(numCorrect)} className="w-full py-3 serif font-bold" style={{ background: INK, color: CREAM }}>
                  Choose a new list →
                </button>
              </div>
            </motion.div>
          </motion.div>
        )}
      </AnimatePresence>
    </div>
  );
};

// ──────────────────────────────────────────────────────────────────────────
// APP
// ──────────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("hero");
  const [topic, setTopic] = useState("");
  const [titles, setTitles] = useState([]);  // array of {title, builtin?: object}
  const [list, setList] = useState(null);
  const [loadingTitles, setLoadingTitles] = useState(false);
  const [loadingList, setLoadingList] = useState(false);
  const [played, setPlayed] = useState([]);
  const [error, setError] = useState(null);
  const [sound, setSound] = useState(true);
  const [maxStrikes, setMaxStrikes] = useState(5);
  const [keyModalOpen, setKeyModalOpen] = useState(false);
  const [hasKey, setHasKey] = useState(!!getApiKey());

  // Re-sync hasKey whenever modal closes
  useEffect(() => { if (!keyModalOpen) setHasKey(!!getApiKey()); }, [keyModalOpen]);

  const goPickCategory = async (catOrQuery) => {
    setError(null);
    setTopic(catOrQuery);
    setScreen("picker");
    setLoadingTitles(true);
    setTitles([]);

    // If we have built-in lists for this exact category, use them (instant).
    if (BUILTIN_LISTS[catOrQuery]) {
      const arr = BUILTIN_LISTS[catOrQuery].map(l => ({ title: l.title, builtin: l }));
      setTitles(arr);
      setLoadingTitles(false);

      // If user has a key, also generate fresh additional titles in background
      if (getApiKey()) {
        try {
          const result = await generateListTitles(catOrQuery);
          const more = (result.titles || []).map(t => ({ title: t }));
          setTitles([...arr, ...more]);
        } catch (e) { /* silent — builtins still work */ }
      }
      return;
    }

    // No built-in — must use API
    if (!getApiKey()) {
      setError("That category needs AI. Add an API key, or pick a built-in category.");
      setScreen("hero");
      setLoadingTitles(false);
      return;
    }

    try {
      const result = await generateListTitles(catOrQuery);
      setTitles((result.titles || []).map(t => ({ title: t })));
    } catch (e) {
      setError("Couldn't generate lists: " + e.message);
      setScreen("hero");
    } finally {
      setLoadingTitles(false);
    }
  };

  const pickList = async (titleObj) => {
    setError(null);
    setLoadingList(true);

    // If this title carries a built-in list, use it directly
    if (titleObj && titleObj.builtin) {
      setList(titleObj.builtin);
      setScreen("pregame");
      setLoadingList(false);
      return;
    }

    const titleStr = typeof titleObj === "string" ? titleObj : titleObj.title;

    // Try built-in lookup by title match across categories
    for (const cat in BUILTIN_LISTS) {
      const match = BUILTIN_LISTS[cat].find(l => l.title === titleStr);
      if (match) { setList(match); setScreen("pregame"); setLoadingList(false); return; }
    }

    // Otherwise generate
    if (!getApiKey()) {
      setError("That list needs AI to generate.");
      setLoadingList(false);
      return;
    }
    try {
      const result = await generateList(titleStr);
      setList(result);
      setScreen("pregame");
    } catch (e) {
      setError("Couldn't load that list: " + e.message);
    } finally {
      setLoadingList(false);
    }
  };

  const finishGame = (score) => {
    if (list) setPlayed(p => [{ title: list.title, score }, ...p.filter(x => x.title !== list.title)]);
    setScreen("hero");
    setList(null);
    setTitles([]);
    setTopic("");
  };

  return (
    <Stage>
      <AnimatePresence mode="wait">
        {screen === "hero" && (
          <motion.div key="hero" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
            <Hero
              onPickCategory={goPickCategory}
              onSearch={goPickCategory}
              played={played}
              onReplay={(p) => pickList(p.title)}
              sound={sound}
              setSound={setSound}
              error={error}
              hasKey={hasKey}
              onOpenKey={() => setKeyModalOpen(true)}
            />
          </motion.div>
        )}
        {screen === "picker" && (
          <motion.div key="picker" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
            <ListPicker topic={topic} titles={titles} loading={loadingTitles || loadingList} onPick={pickList} onBack={() => setScreen("hero")}/>
          </motion.div>
        )}
        {screen === "pregame" && list && (
          <motion.div key="pregame" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
            <PreGame list={list} maxStrikes={maxStrikes} setMaxStrikes={setMaxStrikes} onStart={() => setScreen("game")} onBack={() => setScreen("picker")}/>
          </motion.div>
        )}
        {screen === "game" && list && (
          <motion.div key="game" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
            <GameBoard list={list} maxStrikes={maxStrikes} sound={sound} onNewList={finishGame}/>
          </motion.div>
        )}
      </AnimatePresence>
      <KeyModal open={keyModalOpen} onClose={() => setKeyModalOpen(false)} currentKey={getApiKey()}/>
    </Stage>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
